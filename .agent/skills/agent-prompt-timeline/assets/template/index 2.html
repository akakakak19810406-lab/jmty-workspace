<!doctype html>
<!--
  Prompt Timeline is a static learning site for reviewing agent prompts,
  work summaries, and follow-up actions recorded in this repository.
-->
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prompt Timeline</title>
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">team-info learning log</p>
        <h1>Prompt Timeline</h1>
      </div>
      <nav aria-label="Timeline controls">
        <a class="icon-link" href="./data/events.jsonl" download aria-label="JSONLをダウンロード">
          <span aria-hidden="true">↓</span>
          <span>JSONL</span>
        </a>
      </nav>
    </header>

    <main class="app-shell">
      <section class="hero-panel" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="eyebrow">原文 → 要約 → 学び</p>
          <h2 id="hero-title">指示と実作業を、時系列で復習できる場所。</h2>
          <p>
            Hook がユーザー指示を自動で追記し、作業後の要約を Skill で同じログへ重ねます。
            後から「どんな頼み方で、何が起きたか」を検索・比較できます。
          </p>
        </div>
        <img src="./assets/timeline-visual.svg" width="420" height="260" alt="プロンプト、作業、学びが時系列に並ぶ図">
      </section>

      <section class="controls" aria-label="Search and filters">
        <label class="search-box">
          <span>検索</span>
          <input id="searchInput" type="search" placeholder="プロンプト、要約、ファイル名で検索">
        </label>
        <div class="segmented" role="group" aria-label="Summary filter">
          <button class="segment is-active" type="button" data-filter="all">すべて</button>
          <button class="segment" type="button" data-filter="summarized">要約あり</button>
          <button class="segment" type="button" data-filter="open">要約待ち</button>
        </div>
        <label class="file-import">
          <span>JSONL読込</span>
          <input id="fileInput" type="file" accept=".jsonl,.json,application/json">
        </label>
      </section>

      <section class="stats-grid" aria-label="Timeline summary">
        <article>
          <span class="stat-label">記録数</span>
          <strong id="statTotal">0</strong>
        </article>
        <article>
          <span class="stat-label">要約済み</span>
          <strong id="statSummarized">0</strong>
        </article>
        <article>
          <span class="stat-label">最新</span>
          <strong id="statLatest">-</strong>
        </article>
      </section>

      <section class="workspace">
        <div class="timeline-column">
          <div class="section-heading">
            <h2>Timeline</h2>
            <span id="resultCount">0件</span>
          </div>
          <ol id="timelineList" class="timeline-list" aria-label="Prompt timeline"></ol>
        </div>

        <aside class="detail-panel" aria-labelledby="detailTitle">
          <div class="section-heading">
            <h2 id="detailTitle">Detail</h2>
            <span id="detailStatus">未選択</span>
          </div>
          <div id="detailContent" class="detail-content">
            <p class="empty-state">左のタイムラインから記録を選ぶと、原文と作業要約を並べて確認できます。</p>
          </div>
        </aside>
      </section>
    </main>

    <script src="./assets/events.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
